# CI — universal quality gate (governance template).
#
# Auto-detecta o stack: cada job só age se os ficheiros relevantes existirem,
# por isso é SEGURO em qualquer repo — num repo só de docs/dados os jobs
# concluem verdes sem fazer nada; num webapp correm a sério.
#
#   build-test : corre se houver package.json. Detecta Bun antes de npm para
#                evitar package-locks stale em repos Lovable. Instala deps,
#                corre lint/build/test se existirem e bloqueia audit high/critical.
#   deno-check : corre se houver edge functions Deno (supabase/functions/*/index.ts),
#                que ficam FORA do tsconfig do frontend — build/lint não as veem.
#                Tolerante a falhas de rede do CDN (esm.sh/deno.land): avisa,
#                não falha; só falha em erro real de código.
#   gitleaks   : corre SEMPRE, em todos os repos. Scan da história completa
#                (não só do diff) — é a rede de segurança do lado do servidor
#                para repos onde algo (ex: Lovable) comita direto a `main`
#                sem passar pelo pre-commit hook local (.githooks/pre-commit).
#                Falha o build se encontrar um segredo real.
#   governance-check : valida a estrutura em todos os runs. Em pull requests,
#                alterações a artefactos rastreados (incluindo docs/decisions)
#                exigem actualizações tanto no INDEX.md como no CHANGELOG.md.
#   template-tests : no template original, valida os quatro perfis e executa
#                mini-projectos reais npm, Bun e Deno. Após aplicar um perfil,
#                tests/template é removido e este job termina como skip seguro.
#
# Editar/adicionar este ficheiro exige o scope 'workflow' no token git.
# Em repos de org cujo token não o tem → adicionar via editor web do GitHub.

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - id: detect
        run: |
          node scripts/detect-ci-mode.mjs --github-output >> "$GITHUB_OUTPUT"
      - name: Setup Node with npm cache
        if: steps.detect.outputs.package_manager == 'npm' && steps.detect.outputs.npm_lock == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: npm
      - name: Setup Node without cache
        if: steps.detect.outputs.package_manager == 'npm' && steps.detect.outputs.npm_lock != 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
      - name: Setup Bun
        if: steps.detect.outputs.package_manager == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Install npm dependencies
        if: steps.detect.outputs.package_manager == 'npm'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "::warning::package.json exists without package-lock.json; install is non-deterministic"
            npm install --no-audit --no-fund --package-lock=false
          fi
      - name: Install Bun dependencies
        if: steps.detect.outputs.package_manager == 'bun'
        run: bun install --frozen-lockfile
      - if: steps.detect.outputs.node == 'true'
        run: |
          if [ "${{ steps.detect.outputs.package_manager }}" = "bun" ]; then bun run --if-present lint; else npm run lint --if-present; fi
      - if: steps.detect.outputs.node == 'true'
        run: |
          if [ "${{ steps.detect.outputs.package_manager }}" = "bun" ]; then bun run --if-present build; else npm run build --if-present; fi
      - if: steps.detect.outputs.node == 'true'
        run: |
          if [ "${{ steps.detect.outputs.package_manager }}" = "bun" ]; then bun run --if-present test; else npm run test --if-present; fi
      - name: npm dependency audit (block high/critical)
        if: steps.detect.outputs.package_manager == 'npm' && steps.detect.outputs.npm_lock == 'true'
        run: npm audit --audit-level=high
      - name: Bun dependency audit (block high/critical)
        if: steps.detect.outputs.package_manager == 'bun'
        run: bun audit --audit-level=high

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Download and verify gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          GITLEAKS_ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${GITLEAKS_ARCHIVE}" -o "${GITLEAKS_ARCHIVE}"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o gitleaks_checksums.txt
          grep "${GITLEAKS_ARCHIVE}" gitleaks_checksums.txt | sha256sum -c -
          tar -xzf "${GITLEAKS_ARCHIVE}" -C "$RUNNER_TEMP" gitleaks
      - name: Scan full history for secrets
        run: |
          "$RUNNER_TEMP/gitleaks" detect --no-banner --redact --verbose

  deno-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - id: detect
        run: |
          node scripts/detect-ci-mode.mjs --github-output >> "$GITHUB_OUTPUT"
      - if: steps.detect.outputs.deno == 'true'
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x
      - if: steps.detect.outputs.deno == 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/deno
          key: deno-${{ hashFiles('supabase/functions/**/*.ts') }}
          restore-keys: deno-
      - name: Type-check all edge functions
        if: steps.detect.outputs.deno == 'true'
        working-directory: supabase/functions
        run: |
          real_fail=0
          for f in */index.ts; do
            ok=0
            for attempt in 1 2 3; do
              out=$(deno check --node-modules-dir=auto --no-lock "$f" 2>&1)
              if [ $? -eq 0 ]; then ok=1; break; fi
              if echo "$out" | grep -qiE "failed: 5[0-9][0-9]|unknown status code|timed out|connection (closed|reset|refused)"; then
                echo "::warning::$f: erro de rede a obter dependencias (tentativa $attempt)"
                sleep 10
                continue
              fi
              echo "$out"
              real_fail=1
              break
            done
            if [ $ok -eq 0 ] && [ $real_fail -eq 0 ]; then
              echo "::warning::$f: ignorado apos falhas de rede (CDN indisponivel, nao e erro de codigo)"
            fi
          done
          exit $real_fail

  template-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
      - name: Setup Bun for executable fixture
        if: hashFiles('tests/template/fixtures/bun/package.json') != ''
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Setup Deno for executable fixture
        if: hashFiles('tests/template/fixtures/deno/supabase/functions/*/index.ts') != ''
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x
      - name: Test template scaffolding and CI detection
        run: |
          if [ -d tests/template ]; then
            node --test tests/template/*.test.mjs
            node tests/template/run-ci-fixtures.mjs
          else
            echo "Template fixture tests removed by applied project profile; skipping."
          fi

  # Gate de governance: valida a estrutura em todos os runs. Num PR que
  # adiciona/altera artefactos rastreados, exige INDEX.md e CHANGELOG.md. Se nenhum
  # caminho de artefacto existir no repo, o grep nao casa e o job conclui verde.
  # A validacao estrutural corre sempre; a comparacao de ficheiros alterados so
  # corre em pull_request, porque push a main nao tem contexto de PR.
  # Motivacao: um PR pode shippar artefactos (ex. videos, edge fns, decisoes) e
  # nunca tocar no INDEX -> drift silencioso entre o repo e o seu mapa.
  governance-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Validate governance structure
        run: node scripts/check-governance.mjs
      - name: INDEX e CHANGELOG devem acompanhar mudancas de artefactos
        if: github.event_name == 'pull_request'
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          CHANGED=$(git diff --name-only "$BASE"...HEAD)
          ART='^(public/videos/|supabase/functions/|supabase/migrations/|stakeholders/|pitches/|research/|decisions/|docs/decisions/|meetings/)'
          if echo "$CHANGED" | grep -qE "$ART"; then
            missing=0
            for required in INDEX.md CHANGELOG.md; do
              if ! echo "$CHANGED" | grep -qx "$required"; then
                echo "::error::PR toca artefactos rastreados sem actualizar $required."
                missing=1
              fi
            done
            echo "Artefactos alterados:"
            echo "$CHANGED" | grep -E "$ART" | sed 's/^/  - /'
            exit "$missing"
          fi
